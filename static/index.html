<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            min-width: 400px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .login-section {
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
        }

        .status.loading {
            background: #f0f8ff;
            color: #2196F3;
            border: 1px solid #2196F3;
        }

        .status.error {
            background: #ffebee;
            color: #f44336;
            border: 1px solid #f44336;
        }

        .status.success {
            background: #e8f5e8;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .user-info {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
        }

        .user-info h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .user-info p {
            margin: 5px 0;
            color: #666;
        }

        .logout-btn {
            background: #dc3545;
            margin-top: 15px;
        }

        .logout-btn:hover {
            background: #c82333;
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Scribe</h1>
            <p class="subtitle">Secure Authentication Portal</p>
        </div>

        <div id="loginSection" class="login-section">
            <button id="loginBtn" class="btn" onclick="initiateLogin()">
                Sign in with Azure AD
            </button>
        </div>

        <div id="userSection" class="hidden">
            <div class="user-info">
                <h3>Welcome back!</h3>
                <p><strong>Name:</strong> <span id="userName"></span></p>
                <p><strong>Email:</strong> <span id="userEmail"></span></p>
                <p><strong>ID:</strong> <span id="userId"></span></p>
                <button class="btn logout-btn" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <div id="status" class="status hidden"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        function showStatus(message, type = 'loading') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }

        function showUserInfo(userInfo) {
            document.getElementById('userName').textContent = userInfo.name || 'N/A';
            document.getElementById('userEmail').textContent = userInfo.email || 'N/A';
            document.getElementById('userId').textContent = userInfo.id || 'N/A';
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('userSection').classList.remove('hidden');
            hideStatus();
        }

        function showLogin() {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('userSection').classList.add('hidden');
            hideStatus();
        }

        async function checkAuthStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/auth/status`);
                const data = await response.json();
                
                if (data.is_authenticated && data.user_info) {
                    showUserInfo(data.user_info);
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('Error checking auth status:', error);
                showLogin();
            }
        }

        async function initiateLogin() {
            try {
                showStatus('Initializing login...', 'loading');
                document.getElementById('loginBtn').disabled = true;
                
                const response = await fetch(`${API_BASE}/api/v1/auth/login`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Failed to initiate login');
                }
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (data.auth_url) {
                    showStatus('Redirecting to Azure AD...', 'loading');
                    // Add a small delay to show the status message
                    setTimeout(() => {
                        window.location.href = data.auth_url;
                    }, 500);
                } else {
                    throw new Error('No authorization URL received');
                }
            } catch (error) {
                console.error('Login error:', error);
                showStatus(`Login failed: ${error.message}`, 'error');
                document.getElementById('loginBtn').disabled = false;
            }
        }

        async function logout() {
            try {
                showStatus('Signing out...', 'loading');
                
                const response = await fetch(`${API_BASE}/api/v1/auth/logout`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    showStatus('Successfully signed out', 'success');
                    setTimeout(() => {
                        showLogin();
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Logout failed');
                }
            } catch (error) {
                console.error('Logout error:', error);
                showStatus(`Logout failed: ${error.message}`, 'error');
            }
        }

        // Handle OAuth callback
        function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            if (error) {
                const errorDescription = urlParams.get('error_description');
                showStatus(`Authentication failed: ${errorDescription || error}`, 'error');
                return;
            }
            
            if (code) {
                showStatus('Processing authentication...', 'loading');
                // The backend will handle the callback, just check status
                setTimeout(() => {
                    checkAuthStatus();
                }, 1000);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check if this is a callback from OAuth
            if (window.location.search.includes('code=') || window.location.search.includes('error=')) {
                handleCallback();
            } else {
                checkAuthStatus();
            }
        });
    </script>
</body>
</html>

# Alembic configuration for Scribe application

[alembic]
# Path to migration scripts
script_location = app/db/migrations

# Template to use to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# timezone = 

# Max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = true

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# Version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. If this key is omitted entirely, it falls back to the legacy
# behavior of splitting on spaces and/or commas.
version_path_separator = os

# Version location specification; This defaults
# to app/db/migrations/versions. When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator is a semicolon for Unix and a semicolon for Windows.
version_locations = %(here)s/app/db/migrations/versions

# Version name format template
# This is used by the alembic revision command to generate the name of the revision file.
# The format is used to generate the file name, which is then used by alembic to order
# the revisions. The default format is "%%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s"
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# The output encoding used when revision files
# are written from script.py.mako
output_encoding = utf-8

# Autogeneration options
compare_type = true
compare_server_default = true
render_as_batch = true

# Connection string for SQL Server - set dynamically in env.py
sqlalchemy.url = 

# Logging configuration
[post_write_hooks]
# Post-write hooks disabled - no formatting
# hooks = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S